<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>Smart Shopping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <canvas id="confettiCanvas" aria-hidden="true"></canvas>

    <button id="closePopupBtn" type="button" class="close-btn" aria-label="סגור חלון">&#10005;</button>

    <header class="app-header">
        <div class="app-header__glow" aria-hidden="true"></div>
        <h1 class="app-header__title">Smart Shopping</h1>
        <p class="app-header__subtitle">השוואת מחירים חכמה בזמן אמת</p>
    </header>

    <section class="product-hero">
        <div class="product-hero__media">
            <img id="productImage" class="product-hero__image" alt="" hidden>
            <div id="productImageFallback" class="product-hero__image-fallback" aria-hidden="true"></div>
        </div>

        <div class="product-hero__content">
            <span class="product-hero__label">Product:</span>
            <p id="productName" class="product-hero__name">Loading...</p>

            <div class="product-hero__ean">
                <span class="product-hero__ean-label">EAN:</span>
                <span id="eanValue" class="product-hero__ean-value">-</span>
            </div>
        </div>
    </section>

    <main class="app-main">
        <section class="card card--compare">
            <h2 class="card__title card__title--inline">השוואת מחירים</h2>

            <div id="dynamicButtonsContainer" class="deals-list">
                <div class="loading-state">
                    <span class="loading-state__dot" aria-hidden="true"></span>
                    <span class="loading-state__text">בודק זמינות באתרים אחרים...</span>
                </div>
            </div>
        </section>

        <section class="card card--alerts">
            <h2 class="card__title">התראות מחיר</h2>
            <p class="card__description">קבלו עדכון כשהמחיר יורד באתרים שאתם עוקבים אחריהם</p>

            <div class="track-action">
                <button id="createAlertBtn" type="button" class="btn-track">Create Product Alert</button>
                <div id="alertStatus" class="track-status" role="status"></div>
            </div>
        </section>
    </main>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>

</html>
